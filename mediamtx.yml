# MediaMTX configuration for ffmpeg-multistream-azure
#
# MediaMTX acts as a persistent RTMP server. When Teams (or any RTMP source)
# starts publishing, runOnReady fires fanout.sh which fans out via ffmpeg.

logLevel: info

# Disable unused protocols — RTMP only
rtsp: false
hls: false
webrtc: false
srt: false

# RTMP server
rtmp: true
rtmpAddress: :1935
rtmpEncryption: "no"

# Path configuration
# all_others matches any path not explicitly defined (accepts whatever the streaming app sends)
paths:
  all_others:
    # Run fanout.sh when a publisher connects and the stream is ready
    # MTX_PATH env var will contain the stream path (e.g. live/stream)
    runOnReady: /fanout.sh
    # Do not restart fanout.sh after the stream ends
    runOnReadyRestart: false
