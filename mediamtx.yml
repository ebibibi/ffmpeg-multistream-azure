# MediaMTX v1.x 設定 — ffmpeg-multistream-azure
# Teams から RTMP を受け取り、配信開始時に fanout.sh を起動してマルチストリームする

logLevel: info

# 不要なプロトコルを無効化（RTMP のみ使用）
rtsp: false
hls: false
webrtc: false
srt: false

# RTMP サーバー設定
rtmp: true
rtmpAddress: :1935
rtmpEncryption: "no"

# パス設定
# all_others: 明示的に設定されていない任意のパスにマッチ（Teams が送るパスを自動受付）
paths:
  all_others:
    # ストリームが準備完了（publisher 接続）したら fanout.sh を起動
    # 環境変数 MTX_PATH にパス名（例: live/stream）が入る
    runOnReady: /fanout.sh
    # 配信が終了したら ffmpeg も自動停止（再起動しない）
    runOnReadyRestart: false
